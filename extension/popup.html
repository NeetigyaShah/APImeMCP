<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body {
    width: 260px;
    background: #1e1e24;
    color: #eee;
    font-family: system-ui, sans-serif;
    padding: 12px;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 10px;
    color: #fff;
  }
  button {
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #recordBtn {
    background: #d9534f;
    color: #fff;
  }
  #stopBtn {
    background: #444;
    color: #fff;
  }
  #saveBtn {
    background: #4caf50;
    color: #fff;
  }
  #counter {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 10px;
  }
  #nameInput {
    width: 100%;
    box-sizing: border-box;
    padding: 6px;
    margin-bottom: 8px;
    border-radius: 4px;
    border: 1px solid #555;
    background: #2a2a30;
    color: #eee;
    font-size: 13px;
  }
  #nameSection {
    display: none;
  }
  #status {
    font-size: 12px;
    margin-top: 8px;
    word-break: break-word;
  }
  #status.error {
    color: #ff8a80;
  }
  #status.success {
    color: #a5d6a7;
  }
</style>
</head>
<body>
  <h1>APImeMCP Recorder</h1>
  <div id="counter">0 steps captured</div>
  <button id="recordBtn">Record</button>
  <button id="stopBtn" disabled>Stop</button>
  <div id="nameSection">
    <input id="nameInput" type="text" placeholder="Recording name" />
    <button id="saveBtn">Save</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
