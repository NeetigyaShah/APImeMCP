name: verify

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      registry_repository:
        description: Registry repository containing the incoming contribution.
        required: true
        type: string
      registry_ref:
        description: Pull-request head SHA or ref to lint.
        required: true
        type: string

jobs:
  verify:
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm test
      - run: node scripts/verify-F00.mjs
      - run: node scripts/verify-engine.mjs
      - run: node scripts/verify-server.mjs
      - run: node scripts/verify-dashboard.mjs
      - run: node scripts/verify-forensics.mjs

  lint-registry-contribution:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: NeetigyaShah/APImeMCP
          path: apimemcp
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.registry_repository }}
          ref: ${{ inputs.registry_ref }}
          path: registry-contribution
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apimemcp/package-lock.json
      - run: npm ci
        working-directory: apimemcp
      - run: npm run build
        working-directory: apimemcp
      - name: Lint incoming registry contribution
        run: node scripts/lint-templates.mjs ../registry-contribution/registry
        working-directory: apimemcp
