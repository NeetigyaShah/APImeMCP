name: verify

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NeetigyaShah/APImeMCP-Templates
          path: registry-templates
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: node scripts/lint-templates.mjs registry-templates/registry
      - run: npm test
      - run: node scripts/verify-F00.mjs
      - run: node scripts/verify-engine.mjs
      - run: node scripts/verify-server.mjs
      - run: node scripts/verify-dashboard.mjs
      - run: node scripts/verify-forensics.mjs
